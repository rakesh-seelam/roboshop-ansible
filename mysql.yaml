- name: Configuring mysql
  hosts: mysql
  become: yes
  tasks: 
  - name: Install MySQL server
    ansible.builtin.dnf:
     name: mysql-server
     state: present
  
  - name: Enabling MySQL server
    ansible.builtin.service:
     name: mysqld
     state: restarted
     enabled: yes

  - name: Setup rootpassword
    ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1