- name: catalogue Configure
  hosts: catalogue
  become: yes
  tasks: 
  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: Install NodeJS
    ansible.builtin.dnf:
     name: nodejs
     state: present

  - name: Create System User
    ansible.builtin.user:
        name: roboshop
        system: true
        shell: /sbin/nologin
        home: /app
        comment: "Roboshop system user"
  
  - name: Create the app directory
    ansible.builtin.file:
      path: /app
      state: directory
  
  - name: Download catalogue code
    ansible.builtin.get_url:
      url: "https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip"
      dest: "/tmp/catalogue.zip"

  - name: Extracting catalogue code
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes
  
  - name: Install npm dependencies
    community.general.npm:
      path: /app

  - name: Copy service file
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service
  
  - name: Copy mongo repo file
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  
  - name: Install MongoDB Host
    ansible.builtin.dnf:
     name: mongodb-mongosh
     state: present
  
  - name: Check data loded or not
    ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: Printing output
    ansible.builtin.debug:
     msg: "{{ catalogue_output }}"

  - name: Loading data to Mongodd
    ansible.builtin.shell: mongosh --host MONGODB-SERVER-IPADDRESS </app/db/master-data.js
    when: catalogue_output.stdout | int < 0 
  
  - name: start catalogue
    ansible.builtin.service:
      name: catalogue
      state: restarted
      enabled: yes
    
